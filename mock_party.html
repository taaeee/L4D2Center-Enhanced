<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Party Panel Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }
    .container {
      max-width: 500px;
      width: 100%;
    }

    /* Theme Variables */
    :root {
      --l4d2-bg-color: #1a1a1a;
      --l4d2-top-color: #2d2d2d;
      --l4d2-text-color: #ffffff;
      --l4d2-border-color: #3d3d3d;
      --l4d2-accent1: #ff9800;
      --l4d2-accent2: #f57c00;
    }

    /* Badge colors from l4d2center */
    .badge7 { background: #7b1fa2; color: #fff; }
    .badge8 { background: #1565c0; color: #fff; }
    .badge6 { background: #2e7d32; color: #fff; }
    .badge5 { background: #ef6c00; color: #fff; }
  </style>
  <link rel="stylesheet" href="src/inject.css">
</head>
<body class="custom-theme">
  <div class="container">
    <ppanel id="playerpanel">
      <div class="private private_dop mt-4">
        <div class="private-head">
          <div class="private-head__title">Party</div>
        </div>
        <div class="private-main">
          <!-- Player 1 -->
          <a class="private-main__item">
            <div class="private-main__left">
              <div class="private-main__block">
                <div class="private-main__img">
                  <div onclick="window.open('/profile/?steam_id=76561199665219218', '_blank');" style="cursor: pointer;">
                    <img src="https://avatars.steamstatic.com/f580e491e0679505f7c38584e4f0a17df0256070_full.jpg" alt="Avatar" onerror="this.onerror=null; this.src='https://avatars.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg'">
                  </div>
                </div>
                <div class="private-main__name"><namestyle style="color:#FFFFFF;">petals</namestyle>&nbsp;&nbsp;&nbsp;<img src="/profile/images/star-silver.svg" height="18.67px" width="16px"></div>
              </div>
              <div class="private-main__status badge7">7863</div>
            </div>
          </a>
          <!-- Player 2 -->
          <a class="private-main__item">
            <div class="private-main__left">
              <div class="private-main__block">
                <div class="private-main__img">
                  <div onclick="window.open('/profile/?steam_id=76561197988614833', '_blank');" style="cursor: pointer;">
                    <img src="https://avatars.steamstatic.com/a9ba5921f1ee026f7fbc2e26b11357a5cd4862dd_full.jpg" alt="Avatar" onerror="this.onerror=null; this.src='https://avatars.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg'">
                  </div>
                </div>
                <div class="private-main__name"><namestyle style="color:#FFFFFF;">gwyn</namestyle></div>
              </div>
              <div class="private-main__status badge8">8182</div>
            </div>
          </a>
          <!-- Player 3 -->
          <a class="private-main__item">
            <div class="private-main__left">
              <div class="private-main__block">
                <div class="private-main__img">
                  <div style="cursor: pointer;">
                    <img src="https://avatars.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg" alt="Avatar">
                  </div>
                </div>
                <div class="private-main__name"><namestyle style="color:#FFFFFF;">K4YZ</namestyle></div>
              </div>
              <div class="private-main__status badge6">6200</div>
            </div>
          </a>
          <!-- Player 4 -->
          <a class="private-main__item">
            <div class="private-main__left">
              <div class="private-main__block">
                <div class="private-main__img">
                  <div style="cursor: pointer;">
                    <img src="https://avatars.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg" alt="Avatar">
                  </div>
                </div>
                <div class="private-main__name"><namestyle style="color:#FFFFFF;">roxas</namestyle></div>
              </div>
              <div class="private-main__status badge5">5540</div>
            </div>
          </a>
          <!-- Player 5 -->
          <a class="private-main__item">
            <div class="private-main__left">
              <div class="private-main__block">
                <div class="private-main__img">
                  <div style="cursor: pointer;">
                    <img src="https://avatars.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg" alt="Avatar">
                  </div>
                </div>
                <div class="private-main__name"><namestyle style="color:#FFFFFF;">shadow</namestyle></div>
              </div>
              <div class="private-main__status badge7">7100</div>
            </div>
          </a>
          <!-- Player 6 -->
          <a class="private-main__item">
            <div class="private-main__left">
              <div class="private-main__block">
                <div class="private-main__img">
                  <div style="cursor: pointer;">
                    <img src="https://avatars.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg" alt="Avatar">
                  </div>
                </div>
                <div class="private-main__name"><namestyle style="color:#FFFFFF;">neko</namestyle></div>
              </div>
              <div class="private-main__status badge8">8400</div>
            </div>
          </a>
        </div>
        <div class="private-footer">
          <div class="private-footer__status">Status:&nbsp;<span>Waiting for players</span></div>
          <div class="private-footer-btns"><a class="private-footer__btn" onclick="LeavePartyButton()"><img src="images/leave-party.svg">Leave Party</a></div>
        </div>
      </div>
    </ppanel>
  </div>
</body>
</html>
